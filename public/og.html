<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; }
    .container { text-align: center; }
    .brackets { display: flex; align-items: center; gap: 48px; justify-content: center; margin-bottom: 60px; }
    .bracket { font-size: 200px; color: #569cd6; font-weight: 100; line-height: 1; }
    .title { color: #d4d4d4; font-size: 48px; font-weight: 300; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brackets">
      <span class="bracket">&lt;/</span>
      <span class="bracket" style="transform: rotate(180deg); display: inline-block;">&lt;/</span>
    </div>
    <div class="title">Pane &amp; Suffering</div>
  </div>
</body>
</html>
